<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosco Polleria Lika</title>
<style>
*{box-sizing:border-box}
body{background:#0f0f0f;color:#fff;font-family:'Arial';margin:0;padding:0;padding-bottom:80px}
.header{background:linear-gradient(90deg,#ff4b2b,#ff416c);padding:15px;text-align:center;position:sticky;top:0;z-index:10}
.logo{width:80px;height:80px;border-radius:50%;border:3px solid #fff;margin-bottom:8px;object-fit:cover;background:#2a2a2a}
.header h1{margin:5px 0;font-size:24px}
.carrito-btn{position:fixed;bottom:20px;right:20px;background:#25D366;width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.6);z-index:20}
.carrito-contador{position:absolute;top:-5px;right:-5px;background:#ff416c;color:#fff;border-radius:50%;width:26px;height:26px;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:bold}
.container{padding:15px;max-width:700px;margin:auto}
.btn-cat{background:#1f1f1f;color:#ff416c;border:2px solid #ff416c;padding:10px 18px;border-radius:25px;cursor:pointer;font-weight:bold;margin:5px}
.btn-cat.active{background:linear-gradient(90deg,#ff4b2b,#ff416c);color:#fff;border:none}
.producto{background:#1a1a1a;border:1px solid #333;border-radius:15px;padding:12px;margin:12px 0;position:relative}
.producto.promo{border:2px solid #ffd700;animation:brillo 2s infinite}
@keyframes brillo{0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.4)}50%{box-shadow:0 0 30px rgba(255,215,0,0.8)}}
.img-prod{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px;background:#2a2a2a}
.precio{color:#00ff88;font-size:22px;font-weight:bold}
.btn-add{background:#ff416c;color:#fff;border:none;padding:10px;border-radius:10px;width:100%;margin-top:8px;cursor:pointer;font-weight:bold}
.btn-borrar-prod{position:absolute;top:10px;right:10px;background:#ff0000;color:#fff;border:none;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold}
.form{background:#1a1a1a;padding:20px;border-radius:15px;margin-top:20px;border:1px solid #333}
input{background:#2a2a2a;color:#fff;border:1px solid #444;padding:12px;border-radius:10px;width:100%;margin:8px 0}
input[type=file]{padding:8px}
.btn-pub{background:linear-gradient(90deg,#ff4b2b,#ff416c);color:#fff;border:none;padding:14px;border-radius:12px;width:100%;font-weight:bold;cursor:pointer;margin-top:8px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:30;overflow-y:auto}
.modal-content{background:#1a1a1a;margin:50px auto;padding:20px;border-radius:15px;max-width:500px}
.btn-cerrar{float:right;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.btn-enviar{background:#25D366;color:#fff;border:none;padding:14px;border-radius:12px;width:100%;font-weight:bold;margin-top:10px;cursor:pointer}
.item-carrito{display:flex;justify-content:space-between;align-items:center;margin:12px 0;padding:10px;background:#222;border-radius:10px}
.btn-borrar{background:#ff416c;color:#fff;border:none;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.preview{width:100%;height:150px;object-fit:cover;border-radius:10px;margin:8px 0;display:none;border:2px dashed #ff416c}
.login-box{background:#1a1a1a;padding:30px;border-radius:15px;text-align:center;margin:50px auto;max-width:400px;border:2px solid #ff416c}
</style>
</head>
<body>
<div class="header">
<img src="https://via.placeholder.com/80/ff416c/fff?text=L" class="logo" id="logoTienda">
<h1>Kiosco Polleria Lika</h1>
</div>

<div class="container">
<div id="login" class="login-box">
<h2>🔒 Acceso Admin</h2>
<p style="color:#aaa;font-size:14px">Solo para el dueño</p>
<input id="clave" type="password" placeholder="Ingresa la clave">
<button class="btn-pub" onclick="entrar()">Entrar</button>
</div>

<div id="tienda" style="display:none">
<div id="categorias"></div>
<div id="productos"></div>

<div class="form">
<h2>➕ Panel Admin</h2>
<input id="nombre" placeholder="Nombre del producto">
<input id="precio" type="number" placeholder="Precio $">
<input id="stock" type="number" placeholder="Stock">
<label style="font-size:14px">📸 Foto del producto:</label>
<input id="fotoFile" type="file" accept="image/*" onchange="previsualizar(event)">
<img id="previewFoto" class="preview">
<label style="font-size:14px">🏬 Logo de la tienda:</label>
<input id="logoFile" type="file" accept="image/*" onchange="cambiarLogo(event)">
<select id="categoria"><option>Polleria</option><option>Bebidas</option><option>Kiosco</option></select>
<label><input type="checkbox" id="promo"> 🔥 En promoción</label>
<button class="btn-pub" onclick="agregar()">Publicar producto</button>
</div>
</div>
</div>

<div class="carrito-btn" onclick="abrirCarrito()">🛒<div class="carrito-contador" id="contador">0</div></div>
